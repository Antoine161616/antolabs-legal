<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anto Labs — Mentions légales</title>
<meta name="description" content="Politiques de confidentialité des applications Anto Labs.">
<style>
  :root { --fond:#fff; --texte:#1a1a1f; --gris:#5f5f6b; --bord:#e4e4ea;
          --accent:#b8860b; --carte:#faf9f7; }
  @media (prefers-color-scheme: dark) {
    :root { --fond:#0d0d10; --texte:#e8e8ec; --gris:#9a9aa6; --bord:#26262e;
            --accent:#deb844; --carte:#15151a; }
  }
  * { box-sizing:border-box; }
  body { margin:0; padding:60px 20px; background:var(--fond); color:var(--texte);
         font:16px/1.65 -apple-system,"Segoe UI",Roboto,sans-serif; }
  .page { max-width:640px; margin:0 auto; }
  .marque { font-weight:800; font-size:15px; color:var(--accent);
            text-transform:uppercase; letter-spacing:.02em; }
  h1 { margin:6px 0 8px; font-size:28px; letter-spacing:-.02em; }
  p.sous { color:var(--gris); margin:0 0 36px; }
  a.appli { display:block; padding:18px 20px; margin-bottom:12px;
            background:var(--carte); border:1px solid var(--bord);
            border-radius:12px; text-decoration:none; color:var(--texte); }
  a.appli:hover { border-color:var(--accent); }
  a.appli .nom { font-weight:700; }
  a.appli .quoi { color:var(--gris); font-size:14px; }
  .pied { margin-top:48px; padding-top:24px; border-top:1px solid var(--bord);
          color:var(--gris); font-size:13.5px; }
</style>
</head>
<body>
  <div class="page">
    <div class="marque">Anto Labs — Software Workshop</div>
    <h1>Mentions légales</h1>
    <p class="sous">Politiques de confidentialité de nos applications.</p>

    <a class="appli" href="viktor.html">
      <div class="nom">VIKTOR: Smart Elite Coach</div>
      <div class="quoi">Coach de musculation — 100 % local, aucune donnée collectée</div>
    </a>

    <div class="pied">
      Anto Labs - Software Workshop<br>
      contact.antolabs@gmail.com
    </div>
  </div>
</body>
</html>
